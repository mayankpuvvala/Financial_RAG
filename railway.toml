[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Model warm-up (dense + sparse + reranker) on first boot takes a while on
# CPU-only instances — give it room before Railway calls the deploy unhealthy.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
